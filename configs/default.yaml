project:
  name: MedMamba-XAI
  seed: 42
  device: cuda:0
  output_dir: runs/medical_mamba
  batch_size: 64
  num_workers: 8  # 0 on Windows, 4+ on Linux/Colab

data:
  dataset: pathmnist
  single_dataset: null
  img_size: 224
  use_weighted_sampler: true
  roots:
    pathmnist:  dataset/pathmnist_dataset
    dermamnist: dataset/dermamnist_dataset
    bloodmnist: dataset/bloodmnist_dataset
    octmnist:   dataset/octmnist_dataset

model:
  size: tiny
  patch_size: 8
  head_dropout: 0.1

training:
  mode: single_task
  epochs: 100
  lr: 1.0e-4
  weight_decay: 0.05
  warmup_epochs: 10
  grad_clip: 1.0
  label_smoothing: 0.1
  mixed_precision: true
  early_stopping_patience: 15
  save_best_metric: avg_f1_macro
